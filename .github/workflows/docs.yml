name: Documentation Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check essential files
        run: |
          test -f README.md && echo "README.md OK" || exit 1
          test -f LICENSE && echo "LICENSE OK" || exit 1
          test -f CHANGELOG.md && echo "CHANGELOG.md OK" || exit 1
          test -d docs && echo "docs/ OK" || exit 1
          DOC_COUNT=$(find docs -name "*.md" | wc -l)
          echo "$DOC_COUNT documentation files found"
          test "$DOC_COUNT" -ge 5 && echo "Documentation complete" || exit 1
