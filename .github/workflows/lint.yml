name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install tools
        run: pip install ruff flake8
      - name: Ruff check
        run: ruff check --exit-zero .
      - name: Flake8
        run: flake8 --max-line-length 120 --exit-zero --exclude=__pycache__,.git,build,dist,.venv .
